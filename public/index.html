<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake — test client</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: #171a21;
        --grid: #1f2430;
        --snake: #4ade80;
        --head: #22c55e;
        --food: #f87171;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #60a5fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px 12px;
      }
      h1 { margin: 0; font-size: 20px; font-weight: 600; }
      .layout { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
      canvas {
        background: var(--panel);
        border-radius: 10px;
        border: 1px solid var(--grid);
        touch-action: none;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--grid);
        border-radius: 10px;
        padding: 16px;
        min-width: 240px;
      }
      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
      button {
        background: var(--grid);
        color: var(--text);
        border: 1px solid #2a3140;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { border-color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .stat { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
      .stat span:first-child { color: var(--muted); }
      .status-running { color: var(--snake); }
      .status-paused { color: #fbbf24; }
      .status-over { color: var(--food); }
      label { font-size: 12px; color: var(--muted); }
      input { width: 60px; background: var(--bg); color: var(--text); border: 1px solid var(--grid); border-radius: 6px; padding: 4px 6px; }
      ol { margin: 6px 0 0; padding-left: 20px; font-size: 13px; color: var(--muted); }
      .hint { font-size: 12px; color: var(--muted); margin-top: 8px; }
      code { background: var(--bg); padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>🐍 Snake — server-authoritative test client</h1>
    <div class="layout">
      <canvas id="board" width="480" height="480"></canvas>
      <div class="panel">
        <div class="row">
          <label>W <input id="w" type="number" value="20" min="5" max="100" /></label>
          <label>H <input id="h" type="number" value="20" min="5" max="100" /></label>
          <label>tick ms <input id="tick" type="number" value="150" min="30" max="2000" /></label>
        </div>
        <div class="row">
          <button id="new">New game</button>
          <button id="pause" disabled>Pause</button>
          <button id="resume" disabled>Resume</button>
          <button id="end" disabled>End</button>
        </div>
        <div class="stat"><span>Game</span><span id="gid">—</span></div>
        <div class="stat"><span>Status</span><span id="status">—</span></div>
        <div class="stat"><span>Score</span><span id="score">0</span></div>
        <div class="stat"><span>Speed (tick)</span><span id="speed">—</span></div>
        <div class="hint">Move with <code>↑ ↓ ← →</code> or <code>WASD</code>.</div>
        <h3 style="margin-bottom:4px;font-size:14px;">Leaderboard (top 10)</h3>
        <ol id="leaderboard"><li>—</li></ol>
        <button id="refreshLb" style="margin-top:6px;">Refresh leaderboard</button>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const canvas = $('board');
      const ctx = canvas.getContext('2d');
      const css = getComputedStyle(document.documentElement);
      const color = (name) => css.getPropertyValue(name).trim();

      let ws = null;
      let gameId = null;
      let state = null;

      function draw() {
        const W = canvas.width, H = canvas.height;
        ctx.fillStyle = color('--panel');
        ctx.fillRect(0, 0, W, H);
        if (!state) return;
        const cols = state.width, rows = state.height;
        const cw = W / cols, ch = H / rows;

        // grid
        ctx.strokeStyle = color('--grid');
        ctx.lineWidth = 1;
        for (let x = 0; x <= cols; x++) { ctx.beginPath(); ctx.moveTo(x*cw,0); ctx.lineTo(x*cw,H); ctx.stroke(); }
        for (let y = 0; y <= rows; y++) { ctx.beginPath(); ctx.moveTo(0,y*ch); ctx.lineTo(W,y*ch); ctx.stroke(); }

        // food
        ctx.fillStyle = color('--food');
        cell(state.food.x, state.food.y, cw, ch, true);

        // snake
        state.snake.forEach((c, i) => {
          ctx.fillStyle = i === 0 ? color('--head') : color('--snake');
          cell(c.x, c.y, cw, ch, false);
        });
      }
      function cell(x, y, cw, ch, round) {
        const pad = 1.5;
        const px = x*cw+pad, py = y*ch+pad, w = cw-2*pad, h = ch-2*pad;
        if (round && ctx.roundRect) { ctx.beginPath(); ctx.roundRect(px, py, w, h, Math.min(w,h)/2); ctx.fill(); }
        else ctx.fillRect(px, py, w, h);
      }

      function render() {
        draw();
        if (!state) return;
        $('gid').textContent = state.id.slice(0, 8);
        const st = $('status');
        st.textContent = state.status;
        st.className = 'status-' + state.status;
        $('score').textContent = state.score;
        $('speed').textContent = state.tickIntervalMs + ' ms';
        $('pause').disabled = state.status !== 'running';
        $('resume').disabled = state.status !== 'paused';
        $('end').disabled = state.status === 'over';
        if (state.status === 'over') loadLeaderboard();
      }

      async function newGame() {
        if (ws) { ws.close(); ws = null; }
        const body = {
          width: +$('w').value, height: +$('h').value,
          baseTickIntervalMs: +$('tick').value,
        };
        const res = await fetch('/games', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        state = await res.json();
        gameId = state.id;
        render();
        openStream();
      }

      function openStream() {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${proto}://${location.host}/games/${gameId}/stream`);
        ws.onmessage = (ev) => {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'state' || msg.type === 'gameover') { state = msg.state; render(); }
        };
      }

      async function send(path, method = 'POST', body) {
        if (!gameId) return;
        const opts = { method };
        if (body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
        const res = await fetch(`/games/${gameId}${path}`, opts);
        if (res.status === 204) return;
        if (res.ok) { state = await res.json(); render(); }
      }

      async function loadLeaderboard() {
        const res = await fetch('/leaderboard');
        const { entries } = await res.json();
        const ol = $('leaderboard');
        ol.innerHTML = entries.length
          ? entries.map((e) => `<li>${e.score} — ${e.gameId.slice(0,8)}</li>`).join('')
          : '<li>—</li>';
      }

      const KEYS = {
        ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
        w: 'up', s: 'down', a: 'left', d: 'right',
      };
      window.addEventListener('keydown', (e) => {
        const dir = KEYS[e.key];
        if (dir && state && state.status === 'running') {
          e.preventDefault();
          send('/direction', 'POST', { direction: dir });
        }
      });

      $('new').onclick = newGame;
      $('pause').onclick = () => send('/pause');
      $('resume').onclick = () => send('/resume');
      $('end').onclick = () => { send('', 'DELETE'); if (ws) ws.close(); };
      $('refreshLb').onclick = loadLeaderboard;

      loadLeaderboard();
      draw();
    </script>
  </body>
</html>
